name: Build Android APK (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: 🔑 Setup signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 📱 Initialize TWA project
        run: |
          bubblewrap init \
            --manifest https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json \
            --directory ./twa-project

      - name: 🏗️ Build APK
        run: |
          cd twa-project
          bubblewrap build \
            --signingKeyPath ../android.keystore \
            --signingKeyAlias ${{ secrets.KEY_ALIAS }} \
            --signingKeyPassword ${{ secrets.KEY_PASSWORD }} \
            --signingStorePassword ${{ secrets.STORE_PASSWORD }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: currency-converter-pro-apk
          path: twa-project/app-release-signed.apk
          retention-days: 30

      - name: 🚀 Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Currency Converter Pro v${{ github.run_number }}"
          body: "✅ تم بناء التطبيق تلقائياً من آخر تحديث"
          files: twa-project/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
